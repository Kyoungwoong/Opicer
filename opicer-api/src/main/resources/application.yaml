spring:
  application:
    name: opicer-api
  profiles:
    active: default
  datasource:
    url: ${OPICER_DB_URL:jdbc:postgresql://localhost:5432/opicer}
    driver-class-name: org.postgresql.Driver
    username: ${OPICER_DB_USER:opicer}
    password: ${OPICER_DB_PASSWORD:opicer}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

opicer:
  auth:
    jwt-secret: ${JWT_SECRET:change-me-please-change-me-please-32bytes}
    jwt-ttl-seconds: ${JWT_TTL_SECONDS:3600}
    cookie-name: OPICER_AUTH
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    admin-allowlist: ${ADMIN_EMAIL_ALLOWLIST:}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  ai:
    openai-api-key: ${OPENAI_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    openai-embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    openai-embedding-dimension: ${OPENAI_EMBEDDING_DIMENSION:1536}
  storage:
    good-answer-dir: ${OPICER_GOOD_ANSWER_DIR:./storage/good-answers}
    good-answer-url-prefix: ${OPICER_GOOD_ANSWER_URL_PREFIX:/media/good-answers}
  credit:
    unsafe-delay-ms: ${OPICER_CREDIT_UNSAFE_DELAY_MS:0}
    idempotency-ttl-hours: ${OPICER_CREDIT_IDEMPOTENCY_TTL_HOURS:24}
